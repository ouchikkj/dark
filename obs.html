<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK // OBS OVERLAY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Share+Tech+Mono&display=swap');
        :root {
            --main: #e8e8e8;
            --dim: #777777;
            --accent: #ffffff;
            --alert: #ff2929;
            --gold: #ffcc33;
            --panel: rgba(5, 5, 5, 0.92);
            --line: rgba(255, 255, 255, 0.2);
        }
        * { box-sizing: border-box; }
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: transparent !important; }
        body { font-family: 'Share Tech Mono', monospace; color: var(--main); }
        body.theme-architect { --main:#69f0ae; --dim:#4caf50; --accent:#69f0ae; --alert:#ff5252; --gold:#b2ff59; --panel:rgba(2,8,2,.93); --line:rgba(105,240,174,.3); }
        body.theme-light { --main:#111; --dim:#555; --accent:#222; --alert:#d32f2f; --gold:#e65100; --panel:rgba(245,245,245,.94); --line:rgba(0,0,0,.25); }
        body.theme-ambar { --main:#ffb000; --dim:#b37700; --accent:#ffcc00; --alert:#ff3300; --gold:#ffe066; --panel:rgba(10,5,0,.94); --line:rgba(255,176,0,.3); }
        body.theme-ordem { --main:#f0f0f0; --dim:#8d8d8d; --accent:#e60000; --alert:#ff1a1a; --gold:#ffffff; --panel:rgba(0,0,0,.95); --line:rgba(230,0,0,.45); }
        body.theme-contencao { --main:#b3e6ff; --dim:#5c99cc; --accent:#80d4ff; --alert:#d90011; --gold:#00ccff; --panel:rgba(2,6,15,.95); --line:rgba(128,212,255,.35); }
        body.theme-neon { --main:#00ffff; --dim:#008888; --accent:#ff00ff; --alert:#ff0055; --gold:#ffff00; --panel:rgba(5,5,16,.94); --line:rgba(255,0,255,.4); }
        body.theme-combat { --main:#ffffff; --dim:#cc7777; --accent:#ff2020; --alert:#ff2020; --gold:#ffffff; --panel:rgba(10,0,0,.95); --line:rgba(255,0,0,.45); }

        .persistent-hud {
            position: fixed; top: 4vh; left: 3vw; width: min(470px, 46vw); min-width: 330px;
            background: linear-gradient(110deg, var(--panel), rgba(0,0,0,.48));
            border: 1px solid var(--line); border-left: 4px solid var(--accent);
            padding: 16px 18px; box-shadow: 0 14px 38px rgba(0,0,0,.62);
            opacity: 0; transform: translateX(-20px); transition: opacity .35s, transform .35s;
            pointer-events: none;
        }
        .persistent-hud.visible { opacity: 1; transform: translateX(0); }
        .hud-layout { display: flex; align-items: stretch; gap: 14px; }
        .hud-portrait-frame { display: none; width: 88px; min-width: 88px; height: 88px; position: relative; overflow: hidden; align-self: flex-start; border: 1px solid var(--line); border-left: 3px solid var(--accent); background: rgba(0,0,0,.55); box-shadow: inset 0 0 18px rgba(0,0,0,.65); }
        .persistent-hud.has-portrait .hud-portrait-frame { display: block; }
        .hud-portrait { width: 100%; height: 100%; object-fit: cover; display: block; filter: contrast(1.04) saturate(.92); }
        .hud-info { flex: 1; min-width: 0; }
        .hud-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; border-bottom: 1px solid var(--line); padding-bottom: 9px; margin-bottom: 11px; }
        .hud-character { font-family:'Oswald',sans-serif; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; color: var(--main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .hud-afi { color: var(--dim); font-size: 12px; letter-spacing: 2px; white-space: nowrap; }
        .hud-stat { display: grid; grid-template-columns: 44px 1fr 82px; align-items: center; gap: 10px; margin: 8px 0; }
        .hud-stat-label { color: var(--dim); font-size: 12px; letter-spacing: 2px; }
        .hud-track { height: 9px; border: 1px solid var(--line); background: rgba(0,0,0,.55); overflow: hidden; }
        .hud-fill { height: 100%; width: 0; background: var(--accent); transition: width .45s ease; }
        .hud-stat.vd .hud-fill { background: var(--alert); }
        .hud-stat.san .hud-fill { background: var(--gold); }
        .hud-value { text-align: right; color: var(--main); font-size: 14px; letter-spacing: 1px; }
        .hud-conditions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; min-height: 0; }
        .hud-condition { border: 1px solid var(--line); color: var(--dim); padding: 4px 7px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
        @media (max-width:700px) { .persistent-hud { width: 90vw; min-width: 0; top: 2vh; left: 3vw; } .hud-portrait-frame { width: 76px; min-width: 76px; height: 76px; } }

        /* PRESETS DE LAYOUT: alteram apenas posição, proporção e organização. */
        body.layout-compact .persistent-hud { top: 2.5vh; left: 2vw; width: min(365px, 38vw); min-width: 285px; padding: 11px 13px; }
        body.layout-compact .hud-layout { gap: 10px; }
        body.layout-compact .hud-portrait-frame { width: 64px; min-width: 64px; height: 64px; }
        body.layout-compact .hud-header { padding-bottom: 5px; margin-bottom: 6px; }
        body.layout-compact .hud-character { font-size: 19px; }
        body.layout-compact .hud-afi, body.layout-compact .hud-stat-label { font-size: 10px; }
        body.layout-compact .hud-stat { grid-template-columns: 34px 1fr 63px; gap: 7px; margin: 5px 0; }
        body.layout-compact .hud-track { height: 7px; }
        body.layout-compact .hud-value { font-size: 11px; }
        body.layout-compact .hud-conditions { margin-top: 7px; gap: 4px; }
        body.layout-compact .hud-condition { padding: 2px 5px; font-size: 8px; }
        body.layout-compact #stage { justify-content: flex-end; padding: 0 3vw 4vh; }
        body.layout-compact .card { width: min(570px, 62vw); min-height: 150px; padding: 17px 21px; }
        body.layout-compact .title { font-size: 24px; }
        body.layout-compact .result { font-size: 52px; }

        body.layout-lowerthird .persistent-hud { top: auto; bottom: 3vh; left: 3vw; width: min(840px, 74vw); min-width: 560px; padding: 13px 17px; }
        body.layout-lowerthird .hud-layout { align-items: center; }
        body.layout-lowerthird .hud-portrait-frame { width: 92px; min-width: 92px; height: 92px; }
        body.layout-lowerthird .hud-info { display: grid; grid-template-columns: repeat(3, minmax(145px, 1fr)); gap: 5px 16px; }
        body.layout-lowerthird .hud-header { grid-column: 1 / -1; margin-bottom: 3px; padding-bottom: 6px; }
        body.layout-lowerthird .hud-stat { grid-template-columns: 34px 1fr 66px; gap: 7px; margin: 4px 0; }
        body.layout-lowerthird .hud-conditions { margin-top: 8px; }
        body.layout-lowerthird #stage { align-items: flex-start; padding: 5vh 5vw 0; }

        body.layout-sidebar .persistent-hud { top: 50%; left: 2vw; width: min(285px, 25vw); min-width: 235px; padding: 15px; transform: translate(-20px, -50%); }
        body.layout-sidebar .persistent-hud.visible { transform: translate(0, -50%); }
        body.layout-sidebar .hud-layout { flex-direction: column; align-items: center; gap: 12px; }
        body.layout-sidebar .hud-portrait-frame { width: 108px; min-width: 108px; height: 108px; align-self: center; }
        body.layout-sidebar .hud-info { width: 100%; }
        body.layout-sidebar .hud-header { flex-direction: column; align-items: center; gap: 3px; text-align: center; }
        body.layout-sidebar .hud-character { width: 100%; text-align: center; }
        body.layout-sidebar .hud-stat { grid-template-columns: 34px 1fr 62px; gap: 7px; }
        body.layout-sidebar .hud-conditions { justify-content: center; }

        body.layout-topbar .persistent-hud { top: 2vh; left: 50%; width: min(920px, 86vw); min-width: 610px; padding: 13px 18px; transform: translate(-50%, -20px); }
        body.layout-topbar .persistent-hud.visible { transform: translate(-50%, 0); }
        body.layout-topbar .hud-layout { align-items: center; }
        body.layout-topbar .hud-portrait-frame { width: 78px; min-width: 78px; height: 78px; }
        body.layout-topbar .hud-info { display: grid; grid-template-columns: repeat(3, minmax(150px, 1fr)); gap: 4px 18px; }
        body.layout-topbar .hud-header { grid-column: 1 / -1; margin-bottom: 2px; padding-bottom: 6px; }
        body.layout-topbar .hud-stat { grid-template-columns: 36px 1fr 70px; gap: 8px; margin: 3px 0; }
        body.layout-topbar .hud-conditions { justify-content: center; margin-top: 7px; }

        body.layout-mirrored .persistent-hud { left: auto; right: 3vw; border-left-width: 1px; border-right: 4px solid var(--accent); transform: translateX(20px); }
        body.layout-mirrored .persistent-hud.visible { transform: translateX(0); }
        body.layout-mirrored .hud-layout { flex-direction: row-reverse; }
        body.layout-mirrored .hud-portrait-frame { border-left-width: 1px; border-right: 3px solid var(--accent); }
        body.layout-mirrored #stage { justify-content: flex-start; padding-left: 4vw; padding-right: 5vw; }

        @media (max-width: 800px) {
            body.layout-lowerthird .persistent-hud, body.layout-topbar .persistent-hud { width: 94vw; min-width: 0; left: 3vw; right: auto; transform: translateY(-15px); }
            body.layout-lowerthird .persistent-hud.visible, body.layout-topbar .persistent-hud.visible { transform: translateY(0); }
            body.layout-lowerthird .hud-info, body.layout-topbar .hud-info { display: block; }
            body.layout-sidebar .persistent-hud { width: 90vw; min-width: 0; top: 2vh; left: 3vw; transform: translateY(-15px); }
            body.layout-sidebar .persistent-hud.visible { transform: translateY(0); }
            body.layout-sidebar .hud-layout { flex-direction: row; align-items: stretch; }
            body.layout-compact .persistent-hud { width: 90vw; min-width: 0; }
            body.layout-mirrored .persistent-hud { left: 3vw; right: auto; border-left: 4px solid var(--accent); border-right: 1px solid var(--line); }
            body.layout-mirrored .hud-layout { flex-direction: row; }
        }

        #stage { position: fixed; inset: 0; display: flex; align-items: flex-end; justify-content: center; padding: 0 5vw 8vh; pointer-events: none; }
        .card {
            width: min(760px, 90vw); min-height: 190px; position: relative; overflow: hidden;
            background: linear-gradient(110deg, var(--panel), rgba(0,0,0,.55));
            border: 1px solid var(--line); border-left: 5px solid var(--accent);
            padding: 24px 30px 22px; box-shadow: 0 18px 55px rgba(0,0,0,.75), 0 0 28px color-mix(in srgb, var(--accent) 22%, transparent);
            opacity: 0; transform: translateY(55px) scale(.97); filter: blur(8px);
        }
        .card.visible { animation: enter .52s cubic-bezier(.18,.86,.3,1.15) forwards; }
        .card.leaving { animation: leave .38s ease-in forwards; }
        .card.critical { border-color: var(--gold); border-left-color: var(--gold); }
        .card.failure { border-color: var(--alert); border-left-color: var(--alert); }
        .scanlines { position:absolute; inset:0; opacity:.12; pointer-events:none; background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,var(--main) 4px); mix-blend-mode:overlay; }
        .topline { display:flex; justify-content:space-between; align-items:flex-start; gap:20px; border-bottom:1px solid var(--line); padding-bottom:12px; }
        .character { color:var(--dim); font-size:14px; letter-spacing:3px; text-transform:uppercase; min-height:18px; }
        .title { font-family:'Oswald',sans-serif; color:var(--main); font-size:30px; line-height:1.05; letter-spacing:2px; text-transform:uppercase; margin-top:3px; }
        .badge { border:1px solid var(--line); color:var(--accent); padding:6px 10px; font-size:12px; letter-spacing:2px; white-space:nowrap; }
        .card.critical .badge { color:var(--gold); border-color:var(--gold); }
        .card.failure .badge { color:var(--alert); border-color:var(--alert); }
        .content { display:grid; grid-template-columns:1fr auto; gap:28px; align-items:end; padding-top:16px; }
        .rolls { color:var(--dim); font-size:16px; letter-spacing:2px; word-break:break-word; }
        .chosen { color:var(--main); font-size:18px; margin-top:9px; }
        .chosen strong { color:var(--accent); font-size:28px; }
        .result-wrap { display:flex; gap:18px; align-items:flex-end; }
        .result-block { min-width:125px; text-align:right; }
        .result-label { color:var(--dim); font-size:11px; letter-spacing:2px; }
        .result { color:var(--accent); font-family:'Oswald',sans-serif; font-size:64px; font-weight:700; line-height:.9; text-shadow:0 0 20px color-mix(in srgb, var(--accent) 45%, transparent); }
        .damage .result { color:var(--alert); text-shadow:0 0 20px color-mix(in srgb, var(--alert) 45%, transparent); }
        .connection { position:fixed; right:20px; bottom:18px; color:rgba(255,255,255,.3); font-size:11px; letter-spacing:2px; opacity:0; transition:.3s; }
        .connection.show { opacity:1; }
        @keyframes enter { 0%{opacity:0;transform:translateY(55px) scale(.97);filter:blur(8px)} 55%{opacity:1;filter:blur(0)} 100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)} }
        @keyframes leave { to{opacity:0;transform:translateY(-35px) scale(.98);filter:blur(7px)} }
        @media (max-width:700px) { .card{padding:18px 20px}.title{font-size:23px}.content{grid-template-columns:1fr;gap:12px}.result-wrap{justify-content:flex-end}.result{font-size:52px} }
    </style>
</head>
<body>
    <aside id="persistentHud" class="persistent-hud" aria-live="polite">
        <div class="hud-layout">
            <div id="hudPortraitFrame" class="hud-portrait-frame"><img id="hudPortrait" class="hud-portrait" alt="Retrato do personagem"></div>
            <div class="hud-info">
                <div class="hud-header"><div id="hudCharacter" class="hud-character">DESCONHECIDO</div><div id="hudAfi" class="hud-afi">AFI 1</div></div>
                <div class="hud-stat vd"><span class="hud-stat-label">VD</span><div class="hud-track"><div id="hudVdFill" class="hud-fill"></div></div><span id="hudVdValue" class="hud-value">0 / 0</span></div>
                <div class="hud-stat san"><span class="hud-stat-label">SAN</span><div class="hud-track"><div id="hudSanFill" class="hud-fill"></div></div><span id="hudSanValue" class="hud-value">0 / 0</span></div>
                <div class="hud-stat pe"><span class="hud-stat-label">PE</span><div class="hud-track"><div id="hudPeFill" class="hud-fill"></div></div><span id="hudPeValue" class="hud-value">0 / 0</span></div>
            </div>
        </div>
        <div id="hudConditions" class="hud-conditions"></div>
    </aside>
    <main id="stage" aria-live="polite"></main>
    <div id="connection" class="connection">AGUARDANDO SINAL...</div>
    <script>
        (() => {
            'use strict';
            const params = new URLSearchParams(location.search);
            const OVERLAY_VERSION = '2026.07.18.2';
            const OBS_PROTOCOL_VERSION = 3;
            const MAX_QUEUE_SIZE = 20;
            const channel = String(params.get('channel') || '').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 80);
            const accessKey = String(params.get('key') || '').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 80);
            const defaultDuration = Math.min(15000, Math.max(2000, (Number.parseInt(params.get('duration'), 10) || 6) * 1000));
            const stage = document.getElementById('stage');
            const connection = document.getElementById('connection');
            const persistentHud = document.getElementById('persistentHud');
            const hudCharacter = document.getElementById('hudCharacter');
            const hudAfi = document.getElementById('hudAfi');
            const hudPortrait = document.getElementById('hudPortrait');
            const hudConditions = document.getElementById('hudConditions');
            const queue = [];
            const receivedIds = new Set();
            const bootTime = Date.now();
            let active = false;
            let eventSource = null;
            let relaySocket = null;
            let relayPollTimer = null;
            let relayReconnectTimer = null;
            let relayWatchdogTimer = null;
            let relayMode = 'none';
            let relayFailureCount = 0;
            let relayPollCycles = 0;
            let relayPollBusy = false;
            let lastRelayActivity = Date.now();
            let broadcastChannel = null;
            applyLayout('standard');

            function safe(value) {
                return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
            }

            function setConnection(text, visible = true) {
                connection.textContent = text;
                connection.classList.toggle('show', visible);
                if (visible) window.setTimeout(() => connection.classList.remove('show'), 2500);
            }

            function applyTheme(theme) {
                Array.from(document.body.classList).forEach(className => {
                    if (className.startsWith('theme-')) document.body.classList.remove(className);
                });
                const allowed = new Set(['architect','light','ambar','ordem','contencao','neon','combat']);
                if (allowed.has(theme)) document.body.classList.add(`theme-${theme}`);
            }

            function applyLayout(layout) {
                Array.from(document.body.classList).forEach(className => {
                    if (className.startsWith('layout-')) document.body.classList.remove(className);
                });
                const allowed = new Set(['standard','compact','lowerthird','sidebar','topbar','mirrored']);
                const selected = allowed.has(layout) ? layout : 'standard';
                if (selected !== 'standard') document.body.classList.add(`layout-${selected}`);
            }

            function normalize(payload) {
                if (!payload || typeof payload !== 'object') return null;
                if (payload.channel && String(payload.channel) !== channel) return null;
                if (accessKey && String(payload.accessKey || '') !== accessKey) return null;
                if (String(payload.event || '') === 'ack') return null;
                const protocol = Number(payload.protocol) || 2;
                if (protocol > OBS_PROTOCOL_VERSION) setConnection(`VERSÃO DO OVERLAY DESATUALIZADA // PROTOCOLO ${protocol}`, true);
                const timestamp = Number(payload.timestamp) || Date.now();
                const eventType = String(payload.event || 'roll');
                if (eventType !== 'hud' && timestamp < bootTime - 2500) return null;
                const id = String(payload.id || `${timestamp}-${Math.random()}`);
                if (receivedIds.has(id)) return null;
                receivedIds.add(id);
                if (receivedIds.size > 150) receivedIds.delete(receivedIds.values().next().value);
                return {
                    id,
                    protocol,
                    appVersion: String(payload.appVersion || ''),
                    timestamp,
                    duration: Math.min(15000, Math.max(2000, Number(payload.duration) || defaultDuration)),
                    event: eventType,
                    character: String(payload.character || '').slice(0, 80),
                    title: String(payload.title || 'ROLAGEM').slice(0, 120),
                    subtitle: String(payload.subtitle || 'DARK DASHBOARD').slice(0, 100),
                    rolls: Array.isArray(payload.rolls) ? payload.rolls.slice(0, 30).map(Number) : [],
                    chosen: Number(payload.chosen) || 0,
                    bonus: Number(payload.bonus) || 0,
                    total: Number(payload.total) || 0,
                    damage: payload.damage === null || payload.damage === undefined ? null : Math.max(0, Number(payload.damage) || 0),
                    critical: Boolean(payload.critical),
                    failure: Boolean(payload.failure),
                    theme: String(payload.theme || 'default'),
                    layout: String(payload.layout || 'standard'),
                    accessKey: String(payload.accessKey || ''),
                    hud: payload.hud && typeof payload.hud === 'object' ? {
                        ...payload.hud,
                        portrait: typeof payload.hud.portrait === 'string' && /^data:image\/(?:jpeg|png|webp);base64,[A-Za-z0-9+/=]+$/.test(payload.hud.portrait) && payload.hud.portrait.length <= 4000 ? payload.hud.portrait : ''
                    } : null
                };
            }



            async function sendAck(event, ackType = 'hud') {
                const ack = {
                    version: 3, protocol: OBS_PROTOCOL_VERSION, overlayVersion: OVERLAY_VERSION,
                    source: 'dark-obs-overlay', event: 'ack', ackType, ackFor: event.id,
                    id: `ack-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                    timestamp: Date.now(), channel, accessKey
                };
                try { broadcastChannel?.postMessage(ack); } catch (error) {}
                try { localStorage.setItem('DarkObsLastAck', JSON.stringify(ack)); } catch (error) {}
                try {
                    const controller = new AbortController();
                    const timeoutId = window.setTimeout(() => controller.abort(), 5000);
                    try {
                        await fetch(`https://ntfy.sh/${encodeURIComponent(channel)}`, {
                            method: 'POST', headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
                            body: JSON.stringify(ack), mode: 'cors', cache: 'no-store', credentials: 'omit', signal: controller.signal
                        });
                    } finally { window.clearTimeout(timeoutId); }
                } catch (error) { console.warn('Confirmação remota do overlay indisponível.', error); }
            }

            function clampPercent(current, max) {
                const maximum = Math.max(1, Number(max) || 1);
                return Math.max(0, Math.min(100, ((Number(current) || 0) / maximum) * 100));
            }

            function updateHud(event) {
                const hud = event.hud;
                if (!hud || hud.enabled === false) {
                    persistentHud.classList.remove('visible');
                    return;
                }
                applyTheme(event.theme);
                applyLayout(event.layout);
                hudCharacter.textContent = event.character || 'DESCONHECIDO';
                hudAfi.textContent = `AFI ${Number(hud.afi) || 1}`;
                if (hud.portrait) {
                    if (hudPortrait.src !== hud.portrait) hudPortrait.src = hud.portrait;
                    persistentHud.classList.add('has-portrait');
                } else {
                    hudPortrait.removeAttribute('src');
                    persistentHud.classList.remove('has-portrait');
                }
                [['Vd','vd'], ['San','san'], ['Pe','pe']].forEach(([prefix, key]) => {
                    const stat = hud[key] || { current: 0, max: 1 };
                    document.getElementById(`hud${prefix}Fill`).style.width = `${clampPercent(stat.current, stat.max)}%`;
                    document.getElementById(`hud${prefix}Value`).textContent = `${Number(stat.current) || 0} / ${Math.max(1, Number(stat.max) || 1)}`;
                });
                hudConditions.replaceChildren();
                const conditions = Array.isArray(hud.conditions) ? hud.conditions.slice(0, 8) : [];
                conditions.forEach(condition => {
                    const tag = document.createElement('span'); tag.className = 'hud-condition'; tag.textContent = String(condition).slice(0, 40); hudConditions.appendChild(tag);
                });
                persistentHud.classList.add('visible');
                sendAck(event, 'hud');
            }

            function enqueue(payload, transport = 'local') {
                if (payload?.remoteOnly && transport !== 'remote') return;
                const event = normalize(payload);
                if (!event) return;
                if (event.event === 'hud') { updateHud(event); return; }
                if (queue.length >= MAX_QUEUE_SIZE) queue.shift();
                queue.push(event);
                if (!active) showNext();
            }

            function showNext() {
                if (!queue.length) { active = false; return; }
                active = true;
                const event = queue.shift();
                applyTheme(event.theme);
                applyLayout(event.layout);
                const status = event.critical ? 'CRÍTICO' : event.failure ? 'FALHA CRÍTICA' : event.event === 'test' ? 'TESTE' : 'RESULTADO';
                const bonus = event.bonus ? ` ${event.bonus > 0 ? '+' : ''}${event.bonus}` : '';
                const rolls = event.rolls.length ? `[ ${event.rolls.join(' | ')} ]` : '[ -- ]';
                const card = document.createElement('section');
                card.className = `card${event.critical ? ' critical' : ''}${event.failure ? ' failure' : ''}`;
                card.innerHTML = `
                    <div class="scanlines"></div>
                    <div class="topline">
                        <div>
                            <div class="character">${safe(event.character)}</div>
                            <div class="title">${safe(event.title)}</div>
                        </div>
                        <div class="badge">${safe(status)}</div>
                    </div>
                    <div class="content">
                        <div>
                            <div class="rolls">DADOS: ${safe(rolls)}</div>
                            <div class="chosen">ESCOLHIDO: <strong>${event.chosen}</strong>${safe(bonus)}</div>
                        </div>
                        <div class="result-wrap">
                            ${event.damage !== null ? `<div class="result-block damage"><div class="result-label">DANO</div><div class="result">${event.damage}</div></div>` : ''}
                            <div class="result-block"><div class="result-label">${safe(event.subtitle)}</div><div class="result">${event.total}</div></div>
                        </div>
                    </div>`;
                stage.replaceChildren(card);
                requestAnimationFrame(() => card.classList.add('visible'));
                if (event.event === 'test') sendAck(event, 'test');
                window.setTimeout(() => {
                    card.classList.remove('visible');
                    card.classList.add('leaving');
                    window.setTimeout(() => { card.remove(); showNext(); }, 420);
                }, event.duration);
            }

            function noteRelayActivity() {
                lastRelayActivity = Date.now();
            }

            function extractRelayPayload(envelope) {
                try {
                    const parsed = typeof envelope === 'string' ? JSON.parse(envelope) : envelope;
                    if (!parsed || typeof parsed !== 'object') return null;
                    noteRelayActivity();
                    if (parsed.event === 'open' || parsed.event === 'keepalive') return null;
                    if (parsed.event !== 'message') return null;
                    const payload = JSON.parse(parsed.message);
                    if (payload?.event === 'ack') return null;
                    return payload;
                } catch (error) { console.warn('Evento remoto inválido.', error); return null; }
            }

            function parseRelayEnvelope(envelope) {
                const payload = extractRelayPayload(envelope);
                if (payload) enqueue(payload, 'remote');
            }

            function processRelayBatch(text) {
                const payloads = text.split(/\r?\n/).filter(Boolean).map(extractRelayPayload).filter(Boolean);
                let latestHud = null;
                payloads.forEach(payload => {
                    if (String(payload.event || '') === 'hud') {
                        if (!latestHud || Number(payload.timestamp || 0) > Number(latestHud.timestamp || 0)) latestHud = payload;
                    } else if (Number(payload.timestamp || 0) >= bootTime - 2500) enqueue(payload, 'remote');
                });
                if (latestHud) enqueue(latestHud, 'remote');
            }

            async function pollRelay(since = '12h') {
                if (relayPollBusy) return false;
                relayPollBusy = true;
                const controller = new AbortController();
                const timeoutId = window.setTimeout(() => controller.abort(), 9000);
                try {
                    const url = `https://ntfy.sh/${encodeURIComponent(channel)}/json?poll=1&since=${encodeURIComponent(since)}&_=${Date.now()}`;
                    const response = await fetch(url, { mode: 'cors', cache: 'no-store', credentials: 'omit', signal: controller.signal });
                    if (!response.ok) {
                        if (response.status === 429) setConnection('LIMITE TEMPORÁRIO DO RELAY ATINGIDO', true);
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const text = await response.text();
                    noteRelayActivity(); processRelayBatch(text); return true;
                } catch (error) {
                    console.warn('Polling do relay indisponível.', error); return false;
                } finally { window.clearTimeout(timeoutId); relayPollBusy = false; }
            }

            function clearRelayReconnect() {
                if (relayReconnectTimer) window.clearTimeout(relayReconnectTimer);
                relayReconnectTimer = null;
            }

            function closeRelayTransport() {
                clearRelayReconnect();
                if (eventSource) {
                    try { eventSource.onerror = null; eventSource.onmessage = null; eventSource.close(); } catch (error) {}
                    eventSource = null;
                }
                if (relaySocket) {
                    try {
                        relaySocket.onopen = relaySocket.onmessage = relaySocket.onerror = relaySocket.onclose = null;
                        relaySocket.close();
                    } catch (error) {}
                    relaySocket = null;
                }
                if (relayPollTimer) window.clearTimeout(relayPollTimer);
                relayPollTimer = null;
                relayMode = 'none';
            }

            function scheduleRelayReconnect(delay = 3000, mode = 'sse') {
                clearRelayReconnect();
                if (navigator.onLine === false) {
                    setConnection('SEM INTERNET — AGUARDANDO RECONEXÃO', true);
                    return;
                }
                relayReconnectTimer = window.setTimeout(() => {
                    relayReconnectTimer = null;
                    if (mode === 'websocket') startWebSocketTransport();
                    else if (mode === 'polling') startPollingFallback();
                    else startSseTransport();
                }, delay);
            }

            function startPollingFallback() {
                closeRelayTransport();
                relayMode = 'polling';
                relayPollCycles = 0;
                setConnection('MODO COMPATÍVEL // RECUPERANDO SINAL', true);

                const runPoll = async () => {
                    if (relayMode !== 'polling') return;
                    const ok = await pollRelay(relayPollCycles === 0 ? '12h' : '90s');
                    relayPollCycles += 1;
                    if (ok && relayPollCycles === 1) setConnection('OVERLAY CONECTADO // POLLING', true);
                    if (relayPollCycles >= 4) {
                        // O polling é apenas emergência. Tenta restaurar o stream a cada ~2 minutos.
                        scheduleRelayReconnect(1000, 'sse');
                        return;
                    }
                    relayPollTimer = window.setTimeout(runPoll, ok ? 30000 : 45000);
                };
                runPoll();
            }

            function startWebSocketTransport() {
                closeRelayTransport();
                relayMode = 'websocket';
                setConnection('RECONECTANDO OVERLAY...', true);
                try {
                    const socket = new WebSocket(`wss://ntfy.sh/${encodeURIComponent(channel)}/ws`);
                    relaySocket = socket;
                    const openTimeout = window.setTimeout(() => {
                        if (relaySocket === socket && socket.readyState !== WebSocket.OPEN) startPollingFallback();
                    }, 8000);
                    socket.onopen = () => {
                        if (relaySocket !== socket) return;
                        window.clearTimeout(openTimeout);
                        noteRelayActivity();
                        relayFailureCount = 0;
                        setConnection('OVERLAY CONECTADO // WEBSOCKET', true);
                        pollRelay('12h');
                    };
                    socket.onmessage = event => parseRelayEnvelope(event.data);
                    socket.onerror = () => {
                        window.clearTimeout(openTimeout);
                        if (relaySocket === socket) startPollingFallback();
                    };
                    socket.onclose = () => {
                        window.clearTimeout(openTimeout);
                        if (relaySocket === socket) startPollingFallback();
                    };
                } catch (error) {
                    console.warn('WebSocket do relay indisponível.', error);
                    startPollingFallback();
                }
            }

            function startSseTransport() {
                closeRelayTransport();
                relayMode = 'sse';
                setConnection('CONECTANDO OVERLAY...', true);
                try {
                    const source = new EventSource(`https://ntfy.sh/${encodeURIComponent(channel)}/sse`);
                    eventSource = source;
                    let opened = false;
                    const openTimeout = window.setTimeout(() => {
                        if (!opened && eventSource === source) {
                            relayFailureCount += 1;
                            startWebSocketTransport();
                        }
                    }, 9000);
                    source.onopen = () => {
                        if (eventSource !== source) return;
                        opened = true;
                        window.clearTimeout(openTimeout);
                        noteRelayActivity();
                        relayFailureCount = 0;
                        setConnection('OVERLAY CONECTADO // SSE', true);
                        // Recupera o HUD mais recente do cache do relay após recarregar/reconectar.
                        pollRelay('12h');
                    };
                    source.addEventListener('keepalive', () => noteRelayActivity());
                    source.addEventListener('open', () => noteRelayActivity());
                    source.onmessage = event => parseRelayEnvelope(event.data);
                    source.onerror = () => {
                        window.clearTimeout(openTimeout);
                        if (eventSource !== source) return;
                        relayFailureCount += 1;
                        try { source.close(); } catch (error) {}
                        eventSource = null;
                        if (relayFailureCount >= 2) scheduleRelayReconnect(2500, 'websocket');
                        else scheduleRelayReconnect(2500, 'sse');
                    };
                } catch (error) {
                    console.warn('SSE do relay indisponível.', error);
                    relayFailureCount += 1;
                    startWebSocketTransport();
                }
            }

            if (!accessKey) setConnection('CANAL LEGADO SEM CHAVE — RECOPIE A URL', true);

            if (!channel || channel.length < 16) {
                setConnection('CANAL INVÁLIDO — COPIE A URL PELO DASHBOARD', true);
                return;
            }

            if ('BroadcastChannel' in window) {
                try {
                    broadcastChannel = new BroadcastChannel(`dark-obs-${channel}`);
                    broadcastChannel.addEventListener('message', event => enqueue(event.data, 'local'));
                } catch (error) { console.warn(error); }
            }

            window.addEventListener('storage', event => {
                if (event.key !== 'DarkObsLastEvent' || !event.newValue) return;
                try { enqueue(JSON.parse(event.newValue), 'local'); } catch (error) { console.warn(error); }
            });

            window.addEventListener('online', () => {
                relayFailureCount = 0;
                startSseTransport();
            });
            window.addEventListener('offline', () => {
                closeRelayTransport();
                setConnection('SEM INTERNET — OVERLAY PAUSADO', true);
            });
            window.addEventListener('pageshow', () => {
                if (navigator.onLine === false) return;
                if (relayMode === 'none') startSseTransport();
                else pollRelay('12h');
            });
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && navigator.onLine !== false) {
                    if (Date.now() - lastRelayActivity > 60000 || relayMode === 'none') startSseTransport();
                    else pollRelay('12h');
                }
            });
            window.addEventListener('beforeunload', closeRelayTransport);

            // O servidor envia keepalive normalmente a cada ~45 s. Se nenhum sinal chegar
            // por mais de 110 s, a conexão do Chromium/OBS é considerada congelada e refeita.
            relayWatchdogTimer = window.setInterval(() => {
                if (navigator.onLine === false || relayMode === 'polling') return;
                if (Date.now() - lastRelayActivity > 110000) {
                    setConnection('CONEXÃO CONGELADA — RECONECTANDO', true);
                    relayFailureCount += 1;
                    startSseTransport();
                }
            }, 15000);

            startSseTransport();
        })();
    </script>
</body>
</html>
